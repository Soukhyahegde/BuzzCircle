version: '3'

services:
  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: buzzcircle_db
      MYSQL_USER: buzzuser
      MYSQL_PASSWORD: buzzpass
    ports:
      - "3306:3306"

  buzzcircle:
    build:
      context: ..
    volumes:
      - ..:/workspace
    command: sleep infinity
