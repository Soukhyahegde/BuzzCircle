spring.application.name=buzzcircle
# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/buzzcircle?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=acer123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

springdoc.swagger-ui.path=/swagger




# Hibernate + JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

#spring.datasource.url=jdbc:mysql://localhost:3306/buzzcircle?useSSL=false&serverTimezone=UTC&characterEncoding=utf8mb4
spring.jpa.properties.hibernate.connection.charSet=utf8mb4


# Optional: Configure server port
server.port=8080
