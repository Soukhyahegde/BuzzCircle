spring.application.name=buzzcircle
# MySQL Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/buzzcircle?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}




# Hibernate + JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

#spring.datasource.url=jdbc:mysql://localhost:3306/buzzcircle?useSSL=false&serverTimezone=UTC&characterEncoding=utf8mb4
spring.jpa.properties.hibernate.connection.charSet=utf8mb4


# Optional: Configure server port
server.port=8080
